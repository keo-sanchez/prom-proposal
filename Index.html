<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banana Leclerc Prom</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
font-family:Poppins,sans-serif;
background:
radial-gradient(circle,#ffffff55 2px,transparent 3px),
linear-gradient(135deg,#ffb6d5,#ffe8f2);
background-size:60px 60px,100% 100%;
overflow-x:hidden;
color:#3b1835;
}

.page{
position:relative;
max-width:1400px;
margin:auto;
min-height:100vh;
padding:50px;
}

.title{
text-align:center;
position:relative;
z-index:2;
}

.badge{
display:inline-block;
background:#ed4c83;
color:white;
padding:10px 35px;
border-radius:30px;
font-weight:bold;
}

h1{
font-family:Pacifico,cursive;
font-size:70px;
line-height:1.2;
margin-top:30px;
}

h1 span{color:#ef4b86}

.subtitle{
margin:20px;
font-size:18px;
}

.questions{
width:610px;
margin:40px auto;
position:relative;
z-index:3;
}

button{
width:100%;
height:80px;
margin:8px 0;
border:none;
border-radius:22px;
background:#fff;
font-size:18px;
font-weight:600;
text-align:left;
padding:20px;
box-shadow:0 10px 25px #e88aaa44;
cursor:pointer;
}

button:hover{transform:scale(1.02)}

.num{
background:#ef4b86;
color:white;
border-radius:50%;
padding:10px 16px;
margin-right:20px;
}

.note{
width:650px;
margin:35px auto;
padding:25px;
background:#ffffff88;
border:2px solid #ffc1d9;
border-radius:25px;
text-align:center;
}

/* Banana Leclerc image placeholders */

.banana{
position:absolute;
z-index:1;
}

.left-main{
left:-20px;
top:50px;
width:390px;
}

.right-top{
right:20px;
top:30px;
width:250px;
}

.right-mid{
right:30px;
top:300px;
width:250px;
}

.bottom-left{
left:40px;
bottom:40px;
width:280px;
}

.bottom-right{
right:0;
bottom:0;
width:330px;
}

.photo{
width:100%;
border-radius:25px;
}

.polaroid{
background:white;
padding:12px;
transform:rotate(4deg);
}

.caption{
text-align:center;
font-style:italic;
margin-top:8px;
}

.footer{
text-align:center;
margin-top:50px;
}

@media(max-width:900px){
.banana{display:none}
.questions,.note{width:90%}
h1{font-size:45px}
}
</style>
</head>

<body>

<div class="page">

<!-- PUT YOUR BANANA LECLERC PICTURES HERE -->
<!-- Replace the src filenames with your own images -->

<div class="banana left-main">
<img class="photo" src="banana-leclerc-main.jpg" alt="Banana Leclerc">
</div>

<div class="banana right-top polaroid">
<img class="photo" src="banana-leclerc-top.jpg">
<div class="caption">your favorite banana &lt;3</div>
</div>

<div class="banana right-mid polaroid">
<img class="photo" src="banana-leclerc-side.jpg">
</div>

<div class="banana bottom-left">
<img class="photo" src="banana-leclerc-small.jpg">
</div>

<div class="banana bottom-right">
<img class="photo" src="banana-leclerc-bottom.jpg">
</div>


<div class="title">

<div class="badge">❤️ IMPORTANT QUESTION</div>

<h1>Will you go<br><span>to prom with me?</span></h1>

<div class="subtitle">
♡ Choose your answer wisely... 👀 ♡
</div>

</div>


<div class="questions">

<button onclick="correct()">
<span class="num">1</span> Yes! ❤️
</button>

<button onclick="dropkick()">
<span class="num">2</span> Yes but only if I get to dropkick you. 🍌
</button>

<button onclick="ribs()">
<span class="num">3</span> Yes, only because I wanna rip your ribs. 💖
</button>

<button onclick="kick()">
<span class="num">4</span> No, I just wanna kick you. 💀
</button>

</div>


<div class="note">
✨ If you choose the correct answer, you get a <b>LIMITLESS POINT™</b><br>
and full permission to beat the shit out of me.
</div>


<div id="result" class="footer"></div>

</div>


<script>
const result=document.getElementById("result");

async function sendChoice(choice){
await fetch("https://formspree.io/f/xqevqogy",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({choice,time:new Date().toLocaleString()})
});
}

async function correct(){
await sendChoice("Yes");
    result.innerHTML = `
    <h2>🎉 Correct Answer! 🎉</h2>

    <p>
    Congratulations! You have earned <b>∞ Limitless Points™</b>.
    </p>

    <p>
    Your prize includes unlimited teasing rights,
    </p>

    <p>
     the ability to roast me whenever you want, and one complimentary dramatic dropkick into my ego.
     </p>

    <p>
    I'll probably complain the whole time, so maybe stop if I start being too dramatic. ❤️😂
    </p>
    `;
}

async function dropkick(){
await sendChoice("Dropkick");
result.innerHTML="🍌 Accepted...I'll pretend I didn't hear that. 😂❤️";
}

async function ribs(){
await sendChoice("Ribs");
result.innerHTML="💖 Accepted... but please leave at least a few ribs for me. 💀❤️";
}

async function kick(){
await sendChoice("No");
result.innerHTML=`
    <h2>Wrong answer detected.</h2>

    <p>
    The council has overruled your decision. Congratulations, you're coming to prom with me anyway. 😌❤️
    </p>
    `;
}
</script>

</body>
</html>
